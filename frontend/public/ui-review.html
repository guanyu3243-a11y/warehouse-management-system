<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI 批注预览</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: #102033;
        background: #eef3f1;
        font-family:
          Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      }

      .review-shell {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        min-height: 100vh;
      }

      .review-main {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .review-toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 64px;
        padding: 14px 20px;
        background: #ffffff;
        border-bottom: 1px solid #dbe5e1;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 190px;
        font-weight: 700;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        overflow: hidden;
        padding: 3px;
        background: #ffffff;
        border: 1px solid #d8e2de;
        border-radius: 8px;
      }

      .brand-mark img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .path-form {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        flex: 1;
      }

      .path-form input {
        width: 100%;
        height: 36px;
        padding: 0 12px;
        color: #26384c;
        background: #f8fbfa;
        border: 1px solid #cfdbd7;
        border-radius: 8px;
        outline: none;
      }

      .path-form input:focus {
        border-color: #0f7f75;
        box-shadow: 0 0 0 3px rgba(15, 127, 117, 0.12);
      }

      button {
        height: 36px;
        padding: 0 14px;
        color: #243447;
        background: #ffffff;
        border: 1px solid #cbd8d4;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        border-color: #0f7f75;
        color: #0f7f75;
      }

      button.primary {
        color: #ffffff;
        background: #0f7f75;
        border-color: #0f7f75;
      }

      button.primary:hover {
        color: #ffffff;
        background: #0a6e65;
      }

      button.danger {
        color: #b42318;
      }

      .preview-wrap {
        position: relative;
        flex: 1;
        min-height: 0;
        margin: 18px;
        overflow: hidden;
        background: #ffffff;
        border: 1px solid #d8e2de;
        border-radius: 12px;
        box-shadow: 0 16px 36px rgba(16, 32, 51, 0.12);
      }

      iframe {
        width: 100%;
        height: 100%;
        min-height: calc(100vh - 102px);
        border: 0;
        background: #ffffff;
      }

      .annotation-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .annotation-layer.enabled {
        cursor: crosshair;
        pointer-events: auto;
        background:
          linear-gradient(rgba(15, 127, 117, 0.06), rgba(15, 127, 117, 0.06)),
          transparent;
      }

      .pin {
        position: absolute;
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        color: #ffffff;
        background: #d97706;
        border: 2px solid #ffffff;
        border-radius: 999px;
        box-shadow: 0 8px 18px rgba(16, 32, 51, 0.25);
        transform: translate(-50%, -50%);
        font-size: 13px;
        font-weight: 800;
      }

      .review-panel {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        background: #ffffff;
        border-left: 1px solid #dbe5e1;
      }

      .panel-header {
        padding: 20px 20px 14px;
        border-bottom: 1px solid #e3ebe8;
      }

      .panel-header h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.3;
      }

      .panel-header p {
        margin: 8px 0 0;
        color: #657587;
        font-size: 13px;
        line-height: 1.7;
      }

      .panel-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 14px 20px;
        border-bottom: 1px solid #e3ebe8;
      }

      .notes {
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 12px 20px 20px;
      }

      .empty {
        padding: 28px 16px;
        color: #718194;
        text-align: center;
        background: #f6faf8;
        border: 1px dashed #cbd8d4;
        border-radius: 10px;
        font-size: 14px;
        line-height: 1.7;
      }

      .note-card {
        padding: 14px;
        margin-bottom: 12px;
        background: #fbfdfc;
        border: 1px solid #dfe8e5;
        border-radius: 10px;
      }

      .note-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .note-index {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        color: #ffffff;
        background: #d97706;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
      }

      .note-path {
        color: #657587;
        font-size: 12px;
      }

      .note-text {
        margin: 0 0 10px;
        color: #243447;
        font-size: 14px;
        line-height: 1.65;
        white-space: pre-wrap;
      }

      .note-meta {
        color: #7c8998;
        font-size: 12px;
      }

      .note-card button {
        height: 28px;
        padding: 0 10px;
        font-size: 12px;
      }

      .copy-box {
        position: fixed;
        left: -9999px;
        top: -9999px;
      }

      @media (max-width: 1040px) {
        .review-shell {
          grid-template-columns: 1fr;
        }

        .review-panel {
          min-height: auto;
          border-top: 1px solid #dbe5e1;
          border-left: 0;
        }
      }

      @media (max-width: 720px) {
        .review-toolbar {
          align-items: stretch;
          flex-direction: column;
        }

        .brand {
          min-width: 0;
        }

        .path-form {
          flex-direction: column;
          align-items: stretch;
        }

        .preview-wrap {
          margin: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="review-shell">
      <main class="review-main">
        <header class="review-toolbar">
          <div class="brand">
            <span class="brand-mark">
              <img src="/youbao-logo.jpg" alt="友宝 logo" />
            </span>
            <span>UI 批注预览</span>
          </div>
          <form class="path-form" id="pathForm">
            <input id="pathInput" aria-label="预览路径" value="/login" />
            <button type="submit">打开页面</button>
            <button class="primary" type="button" id="modeButton">开始批注</button>
          </form>
        </header>

        <section class="preview-wrap" id="previewWrap">
          <iframe id="previewFrame" title="实时页面预览"></iframe>
          <div class="annotation-layer" id="annotationLayer"></div>
        </section>
      </main>

      <aside class="review-panel">
        <div class="panel-header">
          <h1>页面批注</h1>
          <p>
            点击“开始批注”后，在页面对应位置点一下写意见。完成后复制批注内容发给我，我会按标注继续改。
          </p>
        </div>
        <div class="panel-actions">
          <button type="button" id="copyButton">复制批注</button>
          <button class="danger" type="button" id="clearButton">清空批注</button>
        </div>
        <div class="notes" id="notes"></div>
      </aside>
    </div>
    <textarea class="copy-box" id="copyBox" aria-hidden="true"></textarea>

    <script>
      const params = new URLSearchParams(window.location.search);
      const storageKey = "warehouse-ui-review-notes";
      const pathInput = document.getElementById("pathInput");
      const pathForm = document.getElementById("pathForm");
      const frame = document.getElementById("previewFrame");
      const layer = document.getElementById("annotationLayer");
      const modeButton = document.getElementById("modeButton");
      const notesEl = document.getElementById("notes");
      const copyButton = document.getElementById("copyButton");
      const clearButton = document.getElementById("clearButton");
      const copyBox = document.getElementById("copyBox");

      let currentPath = normalisePath(params.get("path") || "/login");
      let annotateMode = false;
      let notes = loadNotes();

      pathInput.value = currentPath;
      openPath(currentPath);
      render();

      pathForm.addEventListener("submit", (event) => {
        event.preventDefault();
        openPath(pathInput.value);
      });

      modeButton.addEventListener("click", () => {
        annotateMode = !annotateMode;
        layer.classList.toggle("enabled", annotateMode);
        modeButton.textContent = annotateMode ? "退出批注" : "开始批注";
        modeButton.classList.toggle("primary", !annotateMode);
      });

      layer.addEventListener("click", (event) => {
        if (!annotateMode || event.target.classList.contains("pin")) {
          return;
        }

        const rect = layer.getBoundingClientRect();
        const x = ((event.clientX - rect.left) / rect.width) * 100;
        const y = ((event.clientY - rect.top) / rect.height) * 100;
        const text = window.prompt("请输入这处需要修改的意见：");

        if (!text || !text.trim()) {
          return;
        }

        notes.push({
          id: Date.now(),
          path: currentPath,
          x: Number(x.toFixed(2)),
          y: Number(y.toFixed(2)),
          text: text.trim(),
          createdAt: new Date().toLocaleString("zh-CN"),
        });
        saveNotes();
        render();
      });

      notesEl.addEventListener("click", (event) => {
        const deleteId = event.target.dataset.deleteId;
        if (!deleteId) {
          return;
        }
        notes = notes.filter((note) => String(note.id) !== deleteId);
        saveNotes();
        render();
      });

      copyButton.addEventListener("click", async () => {
        const content = formatNotes();
        try {
          await navigator.clipboard.writeText(content);
          copyButton.textContent = "已复制";
        } catch (error) {
          copyBox.value = content;
          copyBox.select();
          document.execCommand("copy");
          copyButton.textContent = "已复制";
        }
        window.setTimeout(() => {
          copyButton.textContent = "复制批注";
        }, 1600);
      });

      clearButton.addEventListener("click", () => {
        if (!notes.length || !window.confirm("确定清空所有批注吗？")) {
          return;
        }
        notes = [];
        saveNotes();
        render();
      });

      function openPath(path) {
        currentPath = normalisePath(path);
        pathInput.value = currentPath;
        frame.src = currentPath;
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("path", currentPath);
        window.history.replaceState(null, "", nextUrl.toString());
        render();
      }

      function normalisePath(path) {
        const cleanPath = String(path || "/login").trim();
        if (/^https?:\/\//i.test(cleanPath)) {
          return cleanPath;
        }
        return cleanPath.startsWith("/") ? cleanPath : `/${cleanPath}`;
      }

      function render() {
        renderPins();
        renderNotes();
      }

      function renderPins() {
        layer.querySelectorAll(".pin").forEach((pin) => pin.remove());
        notes
          .filter((note) => note.path === currentPath)
          .forEach((note, index) => {
            const pin = document.createElement("button");
            pin.type = "button";
            pin.className = "pin";
            pin.style.left = `${note.x}%`;
            pin.style.top = `${note.y}%`;
            pin.title = note.text;
            pin.textContent = index + 1;
            layer.appendChild(pin);
          });
      }

      function renderNotes() {
        if (!notes.length) {
          notesEl.innerHTML =
            '<div class="empty">暂无批注。<br />点击“开始批注”，再点页面位置添加意见。</div>';
          return;
        }

        notesEl.innerHTML = notes
          .map(
            (note, index) => `
              <article class="note-card">
                <div class="note-top">
                  <span class="note-index">${index + 1}</span>
                  <button class="danger" type="button" data-delete-id="${note.id}">删除</button>
                </div>
                <p class="note-text">${escapeHtml(note.text)}</p>
                <div class="note-path">${escapeHtml(note.path)}</div>
                <div class="note-meta">位置 ${note.x}%, ${note.y}% · ${escapeHtml(note.createdAt)}</div>
              </article>
            `,
          )
          .join("");
      }

      function formatNotes() {
        if (!notes.length) {
          return "暂无 UI 批注。";
        }
        return notes
          .map(
            (note, index) =>
              `${index + 1}. 页面：${note.path}\n位置：${note.x}%, ${note.y}%\n意见：${note.text}`,
          )
          .join("\n\n");
      }

      function loadNotes() {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || "[]");
        } catch (error) {
          return [];
        }
      }

      function saveNotes() {
        localStorage.setItem(storageKey, JSON.stringify(notes));
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
