services:
  mysql:
    image: mysql:8.4
    container_name: warehouse-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${DB_NAME}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      TZ: ${TZ:-Europe/London}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    image: warehouse-management-backend:local
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: "${DB_NAME}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_USE_SSL: "false"
      DB_ALLOW_PUBLIC_KEY_RETRIEVAL: "true"
      FLYWAY_ENABLED: "${FLYWAY_ENABLED:-true}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRATION_HOURS: "${JWT_EXPIRATION_HOURS:-8}"
      INIT_ADMIN_ENABLED: "${INIT_ADMIN_ENABLED:-false}"
      INIT_ADMIN_USERNAME: "${INIT_ADMIN_USERNAME:-}"
      INIT_ADMIN_PASSWORD: "${INIT_ADMIN_PASSWORD:-}"
      INIT_ADMIN_EMAIL: "${INIT_ADMIN_EMAIL:-}"
      INIT_ADMIN_PHONE: "${INIT_ADMIN_PHONE:-}"
      TZ: ${TZ:-Europe/London}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
    image: warehouse-management-frontend:local
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mysql_data:
